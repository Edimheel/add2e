name: ADD2E Spell Agent

on:
  workflow_dispatch:
  push:
    branches:
      - agent-audit-sorts
    paths:
      - AGENTS.md
      - fvtt-spells-all.json
      - audit/agent-config.json
      - audit/agent-state.json
      - audit/tools/spell-agent.mjs
      - audit/tools/apply-spell-agent-fixes.mjs
      - audit/tools/generate-reference-files.mjs
      - audit/tools/generate-spell-audit-reports.mjs
      - audit/reference/*.json
      - audit/decoupage_fichier/*.json
      - .github/workflows/spell-agent.yml

permissions:
  contents: write

jobs:
  spell-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent-audit-sorts

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run spell agent
        run: node audit/tools/spell-agent.mjs

      - name: Commit agent outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fvtt-spells-all.json scripts/sorts/*.js audit/agent-state.json audit/rapports/*.md audit/reference/*.json audit/decoupage_fichier/*.json
          if git diff --cached --quiet; then
            echo "No agent outputs to commit"
          else
            git commit -m "Run ADD2E spell agent"
            git push origin agent-audit-sorts
          fi
