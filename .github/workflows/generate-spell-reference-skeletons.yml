name: Générer les références squelettes des sorts

on:
  workflow_dispatch:
  push:
    branches:
      - agent-audit-sorts
    paths:
      - audit/tools/generate-reference-files.mjs
      - audit/decoupage_fichier/index.json
      - audit/reference/manuel-joueurs-sorts-master.json
      - .github/workflows/generate-spell-reference-skeletons.yml

permissions:
  contents: write

jobs:
  generate-reference-skeletons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent-audit-sorts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate reference skeletons
        run: node audit/tools/generate-reference-files.mjs

      - name: Commit generated references
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audit/reference/*.json
          if git diff --cached --quiet; then
            echo "Aucune référence squelette à committer."
          else
            git commit -m "Generate spell reference skeletons"
            git push origin agent-audit-sorts
          fi
